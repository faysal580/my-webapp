<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Visual Team Console{% endblock %}</title>
  <script>
    // Set the theme before first paint to avoid a light/dark flash.
    (function () {
      var saved = localStorage.getItem("vt-theme");
      var theme = saved || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Cartup Visual Team" class="brand-logo">
      <span class="brand-text">VISUAL<span class="brand-accent">TEAM</span></span>
    </a>
    <div class="topbar-right">
      <span class="brand-sub">local console &middot; {{ request.host }}</span>
      {% if session.get('user') %}
        <span class="topbar-user">{{ session.get('user') }}</span>
        <a class="topbar-logout" href="{{ url_for('logout') }}">Log out</a>
      {% endif %}
      <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme">
        <span class="theme-toggle-knob">
          <svg class="theme-toggle-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
          <svg class="theme-toggle-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6"/></svg>
        </span>
      </button>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    Built by Md Faysal Bakaul
  </footer>
  <script>
    document.getElementById("themeToggle").addEventListener("click", function () {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("vt-theme", next);
    });
  </script>
</body>
</html>
