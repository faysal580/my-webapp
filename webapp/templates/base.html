<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Visual Team Console{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Cartup Visual Team" class="brand-logo">
      <span class="brand-text">VISUAL<span class="brand-accent">TEAM</span></span>
    </a>
    <span class="brand-sub">local console &middot; {{ request.host }}</span>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="app-footer">
    Built by Md Faysal Bakaul
  </footer>
</body>
</html>
